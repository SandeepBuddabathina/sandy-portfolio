<section id="contact" class="flex items-center justify-center min-h-screen px-6 pt-32 bg-gray-50">
  <div class="grid w-full max-w-6xl grid-cols-1 gap-12 md:grid-cols-2">
    <!-- Left Info -->
    <div class="animate-slide-in-left">
      <h2 class="mb-6 text-3xl font-bold text-indigo-600">Let's Connect</h2>
      <p class="mb-8 text-gray-600">
        Have a project in mind or just want to say hi? I'm always open to connect!
      </p>
      <ul class="space-y-4 text-lg text-gray-700">
        <li><span class="font-bold text-indigo-500">📍</span> Hyderabad, India</li>
        <li><span class="font-bold text-indigo-500">📞</span> ------</li>
        <li><span class="font-bold text-indigo-500">✉️</span> b99sandeep&#64;gmail.com</li>
      </ul>
    </div>

    <!-- Right Form -->
    <form class="space-y-6 animate-slide-in-right" (ngSubmit)="submitForm()">
      <input type="text" placeholder="Your Name" [(ngModel)]="name" name="name" required
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
      <input type="email" placeholder="Your Email" [(ngModel)]="email" name="email" required
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
      <textarea rows="5" placeholder="Your Message" [(ngModel)]="message" name="message" required
        class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
      <button type="submit" [disabled]="!name || !email || !message"
        class="px-6 py-3 text-white transition-all duration-300 bg-indigo-600 rounded-lg hover:bg-indigo-700 disabled:opacity-50">
        Send Message
      </button>
    </form>
  </div>

  <!-- Chat Button -->
  <button 
    class="fixed z-50 flex items-center justify-center w-14 h-14 text-white bg-indigo-600 rounded-full shadow-xl cursor-pointer bottom-6 right-6 sm:bottom-10 sm:right-10 hover:bg-indigo-700 hover:scale-105 transition-all transform focus:outline-none"
    [class.animate-pulse]="!isChatOpen"
    (click)="toggleChat()" id="chatButton" [class.hidden]="isChatOpen"
    aria-label="Open Chat"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
    </svg>
  </button>

  <!-- Chatbot Window -->
  <div class="fixed bottom-4 right-4 sm:bottom-10 sm:right-10 z-[60] hidden w-[calc(100vw-2rem)] sm:w-80 md:w-96 h-[500px] max-h-[calc(100dvh-6rem)] bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300" 
    id="chatWindow"
    (click)="stopEvent($event)">
    
    <!-- Chat Header -->
    <div class="flex flex-row items-center justify-between px-4 py-3 bg-indigo-600 text-white shadow-sm shrink-0">
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 flex items-center justify-center bg-white rounded-full">
          <span class="text-indigo-600 font-bold text-sm">S</span>
        </div>
        <div>
          <h3 class="font-semibold text-[15px] leading-tight">Sandy's Assistant</h3>
          <p class="text-xs text-indigo-200 leading-tight">Online</p>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-indigo-200 hover:text-white transition-colors focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Chat Messages -->
    <div class="flex-1 min-h-0 overflow-y-auto p-4 bg-gray-50 flex flex-col" id="chatMessages">
      <!-- Initial Bot Message -->
      <div class="flex w-full mb-3 justify-start">
        <div class="max-w-[85%] px-4 py-2 rounded-2xl shadow-sm bg-white text-gray-800 rounded-bl-none text-sm border border-gray-100">
          Hi, how can I help you?
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="p-3 bg-white border-t border-gray-100">
      <div class="flex items-center bg-gray-50 border border-gray-200 rounded-full px-3 py-1 focus-within:ring-2 focus-within:ring-indigo-100 focus-within:border-indigo-400 transition-all">
        <input [(ngModel)]="userMessage" (keyup.enter)="sendMessage()" type="text" placeholder="Type a message..."
          class="flex-1 bg-transparent py-2 px-1 focus:outline-none text-sm text-gray-700 w-full" />
        <button (click)="sendMessage()" class="p-2 ml-1 text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors focus:outline-none disabled:opacity-50" [disabled]="!userMessage.trim()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
            <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
